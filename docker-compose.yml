version: '3.8'

services:
  backend:
    build: ./backend
    container_name: tradingbot-backend
    restart: unless-stopped
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET:-}
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
      - TRADING_MODE=${TRADING_MODE:-demo}
      - FLASK_SECRET=${FLASK_SECRET:-changeme}
    volumes:
      - tradingbot-data:/app/data
    networks:
      - tradingbot-net

  frontend:
    build: ./frontend
    container_name: tradingbot-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - tradingbot-net

  nginx:
    image: nginx:alpine
    container_name: tradingbot-nginx
    restart: unless-stopped
    ports:
      - "3200:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - tradingbot-net

volumes:
  tradingbot-data:

networks:
  tradingbot-net:
    driver: bridge
